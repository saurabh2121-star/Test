<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digit Pattern</title>
    <script>
        
        let n = 5;

        for (let i = 0; i < n; i++) {
            for (let s = 0; s < i; s++) {
                process.stdout.write(" ");
            }
             let num = n - i;
            for (let j = 0; j < (n - i); j++) {
                process.stdout.write(num + " ");
                num--;
            }

            console.log();
        }
    </script>
</head>

<body>

</body>

</html>
