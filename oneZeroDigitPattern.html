<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> one zero digit pattern </title>
    <script>
        let n = 6;

        for (let i = 1; i <= n; i++) {
            let row = "";

            for (let j = 1; j <= i; j++) {
                if ((i + j) % 2 === 0) {
                    row += "1 ";
                } else {
                    row += "0 ";
                }
            }

            console.log(row);
        }
    </script>
</head>

</html>
