    <title>Test 4</title>
    <script>
        let n = 4;

        for (let i = 0; i < 2 * n - 1; i++) {
            let row = "";

            for (let j = 0; j < 2 * n - 1; j++) {
                let val = n - Math.min(Math.min(i, j), Math.min(2 * n - 2 - i, 2 * n - 2 - j));
                row += val + " ";
            }

            console.log(row);
        }
    </script>
